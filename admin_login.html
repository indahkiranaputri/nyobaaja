<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin — Indah's Beauté Atelier Admin</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DUMMY123"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DUMMY123');
</script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin_style.css" />
</head>
<body>

  <main class="ad-auth-page">
    <div class="ad-auth-card">
       <span class="ad-brand-icon" aria-hidden="true" title="Atelier">IBA</span>
      <h1 class="ad-auth-title">Indah's Beauté Atelier Admin</h1>
      <p class="ad-auth-sub">Masuk ke panel pengelola toko</p>

      <form onsubmit="doLogin(event)">
        <div class="ad-auth-field">
          <label for="adminPwd">Kata Sandi Admin</label>
          <input type="password" id="adminPwd" placeholder="••••••••" required autofocus />
        </div>
        <button type="submit" class="ad-auth-btn">Masuk</button>
        <p class="ad-auth-msg" id="adminLoginMsg"></p>
      </form>

      <p class="ad-auth-hint">Kembali ke <a href="index.html" style="color:var(--ad-pink)">Halaman Toko →</a></p>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script src="js/default_products.js"></script>
  <script>window.API_BASE = window.location.origin + '/api';</script>
  <script src="js/api_client.js"></script>
  <script src="js/admin_script.js"></script>
  <script>
    // Jika sudah login, langsung ke dashboard
    if (isLoggedIn()) window.location.href = "admin_dashboard.html";
  </script>
</body>
</html>
